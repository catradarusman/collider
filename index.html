<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>COLLIDER</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background: #0a0a0a;
            -webkit-font-smoothing: antialiased;
        }
        
        button { -webkit-appearance: none; }
        input, textarea { -webkit-appearance: none; }
        
        /* Drag and drop styles */
        .dragging {
            opacity: 0.5;
            cursor: grabbing !important;
        }
        
        .drag-over {
            background: #1f1f1f !important;
            border-color: #ffffff !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const API_URL = 'https://collider.up.railway.app';

        function Collider() {
          const [phase, setPhase] = useState('diverge');
          const [divergeText, setDivergeText] = useState('');
          const [isLoading, setIsLoading] = useState(false);
          const [draggedItem, setDraggedItem] = useState(null);
          const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
          
          const [state, setState] = useState({
            skills: [],
            interests: [],
            opportunities: [],
            niches: [{}] // Changed from 3 to 1
          });

          // Track which niches need idea regeneration
          const [nichesNeedingIdeas, setNichesNeedingIdeas] = useState(new Set());

          useEffect(() => {
            const handleResize = () => setIsMobile(window.innerWidth < 768);
            window.addEventListener('resize', handleResize);
            return () => window.removeEventListener('resize', handleResize);
          }, []);

          const parseItems = (text) => {
            return text.split(/[,\n;]+/)
              .map(item => item.trim())
              .filter(item => item.length > 0);
          };

          const analyzeAndCategorize = async () => {
            const items = parseItems(divergeText);
            
            if (items.length === 0) {
              alert('Add at least a few items!');
              return;
            }

            if (items.length > 50) {
              alert('Max 50 items.');
              return;
            }

            setIsLoading(true);

            try {
              const response = await fetch(`${API_URL}/api/categorize`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ items })
              });

              const result = await response.json();

              if (result.success) {
                setState(prev => ({
                  ...prev,
                  skills: result.data.skills || [],
                  interests: result.data.interests || [],
                  opportunities: result.data.opportunities || []
                }));
                setPhase('converge');
              } else {
                throw new Error(result.error);
              }
              
            } catch (error) {
              console.error('Error:', error);
              alert('Backend not reachable. Check: ' + API_URL);
            } finally {
              setIsLoading(false);
            }
          };

          const removeItem = (item, category) => {
            setState(prev => ({
              ...prev,
              [category]: prev[category].filter(i => i !== item)
            }));
          };

          const addItem = (item, category) => {
            if (item.trim()) {
              setState(prev => ({
                ...prev,
                [category]: [...prev[category], item.trim()]
              }));
            }
          };

          const handleDragStart = (item, category) => {
            setDraggedItem({ item, category });
          };

          const handleDragOver = (e) => {
            e.preventDefault();
          };

          const handleDrop = (targetCategory) => {
            if (draggedItem && draggedItem.category !== targetCategory) {
              setState(prev => ({
                ...prev,
                [draggedItem.category]: prev[draggedItem.category].filter(i => i !== draggedItem.item),
                [targetCategory]: [...prev[targetCategory], draggedItem.item]
              }));
            }
            setDraggedItem(null);
          };

          const generateNiches = async () => {
            if (!state.skills.length || !state.interests.length || !state.opportunities.length) {
              alert('Need at least one item per category!');
              return;
            }

            setIsLoading(true);

            // Generate only 1 niche instead of 3
            const newNiche = {
              skill: state.skills[Math.floor(Math.random() * state.skills.length)],
              interest: state.interests[Math.floor(Math.random() * state.interests.length)],
              opportunity: state.opportunities[Math.floor(Math.random() * state.opportunities.length)],
              ideas: { physical: 'Generating...', digital: 'Generating...', service: 'Generating...' }
            };

            setState(prev => ({ ...prev, niches: [newNiche] }));
            setPhase('emerge');

            try {
              const response = await fetch(`${API_URL}/api/generate-ideas`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  skill: newNiche.skill,
                  interest: newNiche.interest,
                  opportunity: newNiche.opportunity
                })
              });

              const result = await response.json();

              if (result.success) {
                setState(prev => ({
                  ...prev,
                  niches: [{ ...newNiche, ideas: result.data }]
                }));
              }
            } catch (error) {
              console.error('Idea generation failed:', error);
            } finally {
              setIsLoading(false);
            }
          };

          const rerollElement = (nicheIndex, type) => {
            const category = type === 'skill' ? 'skills' : type === 'interest' ? 'interests' : 'opportunities';
            const newValue = state[category][Math.floor(Math.random() * state[category].length)];
            
            // Update the element but KEEP existing ideas
            setState(prev => ({
              ...prev,
              niches: prev.niches.map((niche, i) => 
                i === nicheIndex ? { ...niche, [type]: newValue } : niche
              )
            }));

            // Mark this niche as needing new ideas (but don't clear old ones)
            setNichesNeedingIdeas(prev => new Set(prev).add(nicheIndex));
          };

          const regenerateIdeas = async (nicheIndex) => {
            const niche = state.niches[nicheIndex];
            
            if (!niche.skill || !niche.interest || !niche.opportunity) {
              return;
            }

            setIsLoading(true);

            // Set generating state
            setState(prev => ({
              ...prev,
              niches: prev.niches.map((n, i) => 
                i === nicheIndex 
                  ? { ...n, ideas: { physical: 'Generating...', digital: 'Generating...', service: 'Generating...' } }
                  : n
              )
            }));

            try {
              const response = await fetch(`${API_URL}/api/generate-ideas`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  skill: niche.skill,
                  interest: niche.interest,
                  opportunity: niche.opportunity
                })
              });

              const result = await response.json();

              if (result.success) {
                setState(prev => ({
                  ...prev,
                  niches: prev.niches.map((n, i) => 
                    i === nicheIndex ? { ...n, ideas: result.data } : n
                  )
                }));

                // Remove from needs-ideas set
                setNichesNeedingIdeas(prev => {
                  const newSet = new Set(prev);
                  newSet.delete(nicheIndex);
                  return newSet;
                });
              }
            } catch (error) {
              console.error('Idea generation failed:', error);
            } finally {
              setIsLoading(false);
            }
          };

          return (
            <div style={{
              minHeight: '100vh',
              background: '#0a0a0a',
              color: '#fff',
              fontFamily: "'Space Grotesk', sans-serif",
              padding: isMobile ? '1rem' : '2rem'
            }}>
              {/* Header */}
              <div style={{
                textAlign: 'center',
                marginBottom: isMobile ? '2rem' : '3rem',
                borderBottom: '1px solid #2a2a2a',
                paddingBottom: isMobile ? '1.5rem' : '2rem'
              }}>
                <h1 style={{
                  fontSize: isMobile ? '2rem' : '3rem',
                  fontWeight: 700,
                  letterSpacing: '0.1em',
                  marginBottom: '1rem'
                }}>
                  COLLIDER
                </h1>
                <p style={{
                  color: '#a0a0a0',
                  fontSize: isMobile ? '0.7rem' : '0.85rem',
                  letterSpacing: '0.2em',
                  textTransform: 'uppercase'
                }}>
                  Find where your dots intersect
                </p>
              </div>

              {/* Phase Indicator */}
              <div style={{
                display: 'flex',
                flexDirection: isMobile ? 'column' : 'row',
                gap: '0.75rem',
                marginBottom: isMobile ? '2rem' : '3rem',
                padding: isMobile ? '1rem' : '2rem',
                background: '#151515',
                border: '1px solid #2a2a2a',
                maxWidth: '1200px',
                margin: `0 auto ${isMobile ? '2rem' : '3rem'}`
              }}>
                {[
                  { id: 'diverge', label: 'Collect' },
                  { id: 'converge', label: 'Converge' },
                  { id: 'emerge', label: 'Collide' }
                ].map((p, i) => (
                  <div key={p.id} style={{
                    flex: 1,
                    textAlign: 'center',
                    padding: isMobile ? '0.75rem' : '1rem',
                    border: '1px solid',
                    borderColor: phase === p.id ? '#fff' : '#2a2a2a',
                    opacity: phase === p.id ? 1 : 0.3,
                    transition: 'all 0.3s'
                  }}>
                    <div style={{ fontSize: isMobile ? '1.5rem' : '2rem', fontWeight: 100 }}>
                      0{i + 1}
                    </div>
                    <div style={{
                      fontSize: isMobile ? '0.65rem' : '0.8rem',
                      letterSpacing: '0.1em',
                      textTransform: 'uppercase',
                      marginTop: '0.25rem'
                    }}>
                      {p.label}
                    </div>
                  </div>
                ))}
              </div>

              <div style={{ maxWidth: '1200px', margin: '0 auto' }}>
                {/* COLLECT */}
                {phase === 'diverge' && (
                  <div>
                    <h2 style={{
                      fontSize: isMobile ? '1.2rem' : '1.5rem',
                      fontWeight: 500,
                      letterSpacing: '0.15em',
                      marginBottom: isMobile ? '1.5rem' : '2rem',
                      paddingBottom: '1rem',
                      borderBottom: '1px solid #2a2a2a'
                    }}>
                      01 — COLLECT
                    </h2>
                    <p style={{
                      color: '#a0a0a0',
                      marginBottom: isMobile ? '1.5rem' : '2rem',
                      fontSize: isMobile ? '0.9rem' : '1rem',
                      lineHeight: 1.6
                    }}>
                      List everything. Skills, obsessions, problems, things you are good at.<br />
                      Separate with commas or new lines.
                    </p>
                    <textarea
                      value={divergeText}
                      onChange={(e) => setDivergeText(e.target.value)}
                      placeholder="workshop facilitation, indie music, blockchain, fitness coaching, productivity..."
                      style={{
                        width: '100%',
                        minHeight: isMobile ? '150px' : '200px',
                        background: '#151515',
                        border: '1px solid #2a2a2a',
                        color: '#fff',
                        padding: isMobile ? '0.875rem' : '1rem',
                        fontSize: isMobile ? '0.9rem' : '0.95rem',
                        fontFamily: 'inherit',
                        resize: 'vertical',
                        lineHeight: 1.5
                      }}
                    />
                    <div style={{
                      color: '#a0a0a0',
                      fontSize: isMobile ? '0.75rem' : '0.8rem',
                      marginTop: '0.5rem',
                      textAlign: 'right'
                    }}>
                      {parseItems(divergeText).length} items
                    </div>
                    <div style={{ marginTop: isMobile ? '2rem' : '3rem', textAlign: 'center' }}>
                      <button
                        onClick={analyzeAndCategorize}
                        disabled={isLoading}
                        style={{
                          background: 'transparent',
                          border: '1px solid #fff',
                          color: '#fff',
                          padding: isMobile ? '0.875rem 1.5rem' : '1rem 2rem',
                          fontSize: isMobile ? '0.75rem' : '0.85rem',
                          letterSpacing: '0.1em',
                          textTransform: 'uppercase',
                          cursor: isLoading ? 'wait' : 'pointer',
                          opacity: isLoading ? 0.5 : 1,
                          fontFamily: "monospace",
                          width: isMobile ? '100%' : 'auto',
                          maxWidth: isMobile ? '100%' : '400px',
                          minHeight: '48px'
                        }}
                      >
                        {isLoading ? 'ANALYZING...' : 'CATEGORIZE →'}
                      </button>
                    </div>
                  </div>
                )}

                {/* CONVERGE */}
                {phase === 'converge' && (
                  <div>
                    <h2 style={{
                      fontSize: isMobile ? '1.2rem' : '1.5rem',
                      fontWeight: 500,
                      marginBottom: '1rem',
                      paddingBottom: '1rem',
                      borderBottom: '1px solid #2a2a2a'
                    }}>
                      02 — CONVERGE
                    </h2>
                    <p style={{
                      color: '#a0a0a0',
                      marginBottom: '1rem',
                      fontSize: isMobile ? '0.85rem' : '0.9rem',
                      lineHeight: 1.6
                    }}>
                      {isMobile 
                        ? 'Sorted. Tap × to remove. Add more below.' 
                        : 'Drag cards between columns to reorganize. Click × to remove. Add more below.'}
                    </p>
                    
                    {/* Definitions - responsive grid */}
                    <div style={{
                      display: 'grid',
                      gridTemplateColumns: isMobile ? '1fr' : 'repeat(3, 1fr)',
                      gap: '0.75rem',
                      marginBottom: isMobile ? '1.5rem' : '2rem',
                      padding: isMobile ? '1rem' : '1.5rem',
                      background: '#0f0f0f',
                      border: '1px solid #2a2a2a'
                    }}>
                      {[
                        { label: 'SKILLS', desc: 'What you can do. What you have been paid for.' },
                        { label: 'INTERESTS', desc: 'What you love. What you would study for free.' },
                        { label: 'OPPORTUNITIES', desc: 'Trends rising. Problems unsolved.' }
                      ].map(cat => (
                        <div key={cat.label}>
                          <div style={{
                            fontSize: '0.7rem',
                            letterSpacing: '0.1em',
                            textTransform: 'uppercase',
                            color: '#fff',
                            marginBottom: '0.25rem'
                          }}>
                            {cat.label}
                          </div>
                          <div style={{
                            fontSize: isMobile ? '0.75rem' : '0.8rem',
                            color: '#707070',
                            lineHeight: 1.4
                          }}>
                            {cat.desc}
                          </div>
                        </div>
                      ))}
                    </div>

                    {/* Categories - Trello-style columns on desktop */}
                    <div style={{ 
                      display: 'grid', 
                      gridTemplateColumns: isMobile ? '1fr' : 'repeat(3, 1fr)',
                      gap: isMobile ? '1.5rem' : '1rem', 
                      marginBottom: '2rem' 
                    }}>
                      {['skills', 'interests', 'opportunities'].map(category => (
                        <Category
                          key={category}
                          title={category}
                          items={state[category]}
                          onRemove={(item) => removeItem(item, category)}
                          onAdd={(item) => addItem(item, category)}
                          onDragStart={(item) => handleDragStart(item, category)}
                          onDragOver={handleDragOver}
                          onDrop={() => handleDrop(category)}
                          isDragging={draggedItem?.category === category}
                          isTarget={draggedItem && draggedItem.category !== category}
                          isMobile={isMobile}
                        />
                      ))}
                    </div>

                    {/* Buttons - responsive layout */}
                    <div style={{ 
                      display: 'grid', 
                      gridTemplateColumns: isMobile ? '1fr' : 'repeat(2, 1fr)',
                      gap: '0.75rem', 
                      marginTop: '2rem',
                      maxWidth: isMobile ? '100%' : '600px',
                      margin: isMobile ? '2rem 0 0' : '2rem auto 0'
                    }}>
                      <button onClick={() => setPhase('diverge')} style={{
                        background: 'transparent',
                        border: '1px solid #fff',
                        color: '#fff',
                        padding: '1rem',
                        fontSize: isMobile ? '0.75rem' : '0.85rem',
                        letterSpacing: '0.1em',
                        textTransform: 'uppercase',
                        cursor: 'pointer',
                        fontFamily: "monospace",
                        minHeight: '48px'
                      }}>
                        ← BACK
                      </button>
                      <button onClick={generateNiches} disabled={isLoading} style={{
                        background: 'transparent',
                        border: '1px solid #fff',
                        color: '#fff',
                        padding: '1rem',
                        fontSize: isMobile ? '0.75rem' : '0.85rem',
                        letterSpacing: '0.1em',
                        textTransform: 'uppercase',
                        cursor: isLoading ? 'wait' : 'pointer',
                        opacity: isLoading ? 0.5 : 1,
                        fontFamily: "monospace",
                        minHeight: '48px'
                      }}>
                        {isLoading ? 'COLLIDING...' : 'COLLIDE →'}
                      </button>
                    </div>
                  </div>
                )}

                {/* COLLISIONS */}
                {phase === 'emerge' && (
                  <div>
                    <h2 style={{
                      fontSize: isMobile ? '1.2rem' : '1.5rem',
                      fontWeight: 500,
                      marginBottom: isMobile ? '1.5rem' : '2rem',
                      paddingBottom: '1rem',
                      borderBottom: '1px solid #2a2a2a'
                    }}>
                      03 — COLLISION
                    </h2>
                    <p style={{
                      color: '#a0a0a0',
                      marginBottom: isMobile ? '1.5rem' : '2rem',
                      fontSize: isMobile ? '0.85rem' : '1rem'
                    }}>
                      Your unique intersection. Tap ↻ to re-roll any element.
                    </p>

                    {/* Single collision card - centered */}
                    <div style={{ 
                      maxWidth: '700px',
                      margin: '0 auto'
                    }}>
                      <NicheCard
                        number={1}
                        niche={state.niches[0]}
                        onReroll={(type) => rerollElement(0, type)}
                        onRegenerateIdeas={() => regenerateIdeas(0)}
                        needsIdeas={nichesNeedingIdeas.has(0)}
                        isLoading={isLoading}
                        isMobile={isMobile}
                      />
                    </div>

                    <div style={{ 
                      display: 'grid', 
                      gridTemplateColumns: isMobile ? '1fr' : 'repeat(2, 1fr)',
                      gap: '0.75rem', 
                      marginTop: isMobile ? '2rem' : '3rem',
                      maxWidth: '600px',
                      margin: isMobile ? '2rem 0 0' : '3rem auto 0'
                    }}>
                      <button onClick={() => setPhase('converge')} style={{
                        background: 'transparent',
                        border: '1px solid #fff',
                        color: '#fff',
                        padding: '1rem',
                        fontSize: isMobile ? '0.75rem' : '0.85rem',
                        letterSpacing: '0.1em',
                        textTransform: 'uppercase',
                        cursor: 'pointer',
                        fontFamily: "monospace",
                        minHeight: '48px'
                      }}>
                        ← BACK
                      </button>
                      <button onClick={() => setPhase('diverge')} style={{
                        background: 'transparent',
                        border: '1px solid #fff',
                        color: '#fff',
                        padding: '1rem',
                        fontSize: isMobile ? '0.75rem' : '0.85rem',
                        letterSpacing: '0.1em',
                        textTransform: 'uppercase',
                        cursor: 'pointer',
                        fontFamily: "monospace",
                        minHeight: '48px'
                      }}>
                        START OVER
                      </button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          );
        }

        // Category Component with drag-and-drop
        function Category({ title, items, onRemove, onAdd, onDragStart, onDragOver, onDrop, isDragging, isTarget, isMobile }) {
          const [input, setInput] = useState('');

          return (
            <div 
              onDragOver={!isMobile ? onDragOver : undefined}
              onDrop={!isMobile ? onDrop : undefined}
              className={!isMobile && isTarget ? 'drag-over' : ''}
              style={{
                background: '#151515',
                border: '1px solid #2a2a2a',
                padding: isMobile ? '1rem' : '1rem',
                minHeight: isMobile ? 'auto' : '400px',
                transition: 'all 0.2s',
                opacity: isDragging ? 0.6 : 1
              }}
            >
              <div style={{
                fontSize: '0.8rem',
                textTransform: 'uppercase',
                marginBottom: '1rem',
                paddingBottom: '0.5rem',
                borderBottom: '1px solid #2a2a2a',
                color: '#a0a0a0',
                display: 'flex',
                justifyContent: 'space-between'
              }}>
                <span>{title}</span>
                <span>{items.length}</span>
              </div>

              <div style={{ marginBottom: '1rem', minHeight: '60px' }}>
                {items.map((item, i) => (
                  <div
                    key={i}
                    draggable={!isMobile}
                    onDragStart={!isMobile ? () => onDragStart(item) : undefined}
                    style={{
                      background: '#1a1a1a',
                      border: '1px solid #2a2a2a',
                      padding: '0.625rem',
                      marginBottom: '0.5rem',
                      display: 'flex',
                      justifyContent: 'space-between',
                      gap: '0.5rem',
                      cursor: !isMobile ? 'grab' : 'default',
                      transition: 'all 0.2s'
                    }}
                    onMouseEnter={(e) => !isMobile && (e.currentTarget.style.borderColor = '#404040')}
                    onMouseLeave={(e) => !isMobile && (e.currentTarget.style.borderColor = '#2a2a2a')}
                  >
                    <span style={{ 
                      flex: 1, 
                      fontSize: isMobile ? '0.85rem' : '0.9rem',
                      wordBreak: 'break-word' 
                    }}>{item}</span>
                    <button onClick={() => onRemove(item)} style={{
                      background: 'transparent',
                      border: 'none',
                      color: '#a0a0a0',
                      cursor: 'pointer',
                      fontSize: '1.5rem',
                      padding: '0 0.5rem',
                      minWidth: '44px',
                      minHeight: '44px',
                      display: 'flex',
                      alignItems: 'center',
                      justifyContent: 'center'
                    }}>×</button>
                  </div>
                ))}
              </div>

              <div style={{ display: 'flex', gap: '0.5rem' }}>
                <input
                  value={input}
                  onChange={(e) => setInput(e.target.value)}
                  onKeyPress={(e) => e.key === 'Enter' && (onAdd(input), setInput(''))}
                  placeholder={`Add ${title.slice(0, -1)}...`}
                  style={{
                    flex: 1,
                    background: '#1a1a1a',
                    border: '1px solid #404040',
                    color: '#fff',
                    padding: '0.625rem',
                    fontSize: isMobile ? '0.85rem' : '0.9rem',
                    minHeight: '48px'
                  }}
                />
                <button onClick={() => (onAdd(input), setInput(''))} style={{
                  background: 'transparent',
                  border: '1px solid #404040',
                  color: '#a0a0a0',
                  padding: '0 1rem',
                  fontSize: '1rem',
                  cursor: 'pointer',
                  minWidth: '48px',
                  minHeight: '48px'
                }}>+</button>
              </div>
            </div>
          );
        }

        // Niche Card Component
        function NicheCard({ number, niche, onReroll, onRegenerateIdeas, needsIdeas, isLoading, isMobile }) {
          return (
            <div style={{
              background: '#151515',
              border: '1px solid #2a2a2a',
              padding: isMobile ? '1.25rem' : '2rem'
            }}>

              <div style={{
                display: 'grid',
                gap: '1rem',
                marginBottom: isMobile ? '1.5rem' : '2rem'
              }}>
                {['skill', 'interest', 'opportunity'].map(type => (
                  <div key={type} style={{
                    padding: isMobile ? '0.875rem' : '1rem',
                    background: '#1a1a1a',
                    border: '1px solid #2a2a2a',
                    display: 'flex',
                    justifyContent: 'space-between',
                    alignItems: 'center',
                    gap: '1rem'
                  }}>
                    <div style={{ flex: 1 }}>
                      <div style={{
                        fontSize: '0.65rem',
                        letterSpacing: '0.1em',
                        textTransform: 'uppercase',
                        color: '#a0a0a0',
                        marginBottom: '0.5rem'
                      }}>
                        {type}
                      </div>
                      <div style={{
                        fontSize: isMobile ? '0.9rem' : '1rem',
                        wordBreak: 'break-word',
                        lineHeight: 1.4
                      }}>
                        {niche[type] || '—'}
                      </div>
                    </div>
                    <button onClick={() => onReroll(type)} style={{
                      width: '48px',
                      height: '48px',
                      background: '#1a1a1a',
                      border: '1px solid #fff',
                      color: '#fff',
                      fontSize: '1.2rem',
                      cursor: 'pointer',
                      flexShrink: 0
                    }}>↻</button>
                  </div>
                ))}
              </div>

              {/* Generate Ideas Button - shows ABOVE ideas when elements changed */}
              {needsIdeas && (
                <div style={{
                  marginBottom: isMobile ? '1.5rem' : '2rem',
                  padding: isMobile ? '1rem' : '1.5rem',
                  background: '#1f1f1f',
                  border: '1px solid #404040',
                  textAlign: 'center'
                }}>
                  <div style={{
                    fontSize: '0.75rem',
                    color: '#a0a0a0',
                    marginBottom: '1rem',
                    letterSpacing: '0.1em'
                  }}>
                    Elements changed. Generate new ideas?
                  </div>
                  <button
                    onClick={onRegenerateIdeas}
                    disabled={isLoading}
                    style={{
                      background: 'transparent',
                      border: '1px solid #fff',
                      color: '#fff',
                      padding: isMobile ? '0.875rem 1.5rem' : '1rem 2rem',
                      fontSize: isMobile ? '0.75rem' : '0.85rem',
                      letterSpacing: '0.1em',
                      textTransform: 'uppercase',
                      cursor: isLoading ? 'wait' : 'pointer',
                      opacity: isLoading ? 0.5 : 1,
                      fontFamily: "monospace",
                      width: isMobile ? '100%' : 'auto',
                      minHeight: '48px'
                    }}
                  >
                    {isLoading ? 'GENERATING...' : 'GENERATE IDEAS →'}
                  </button>
                </div>
              )}

              {/* Ideas section - ALWAYS show if ideas exist */}
              {niche.ideas && (
                <div style={{
                  marginTop: isMobile ? '1.5rem' : '2rem',
                  paddingTop: isMobile ? '1.5rem' : '2rem',
                  borderTop: '1px solid #2a2a2a',
                  opacity: needsIdeas ? 0.5 : 1,
                  transition: 'opacity 0.3s'
                }}>
                  <div style={{
                    fontSize: '0.7rem',
                    letterSpacing: '0.1em',
                    color: '#a0a0a0',
                    textTransform: 'uppercase',
                    marginBottom: '1.5rem',
                    display: 'flex',
                    justifyContent: 'space-between',
                    alignItems: 'center'
                  }}>
                    <span>Potential Ideas</span>
                    {needsIdeas && (
                      <span style={{
                        fontSize: '0.65rem',
                        color: '#707070',
                        fontStyle: 'italic',
                        letterSpacing: '0.05em'
                      }}>
                        (Based on previous elements)
                      </span>
                    )}
                  </div>

                  <div style={{ display: 'grid', gap: '1rem' }}>
                    {[
                      { type: 'physical', label: 'PHYSICAL PRODUCT' },
                      { type: 'digital', label: 'DIGITAL PRODUCT' },
                      { type: 'service', label: 'SERVICE' }
                    ].map(({ type, label }) => (
                      <div key={type} style={{
                        background: '#1a1a1a',
                        border: '1px solid #2a2a2a',
                        padding: isMobile ? '0.875rem' : '1rem'
                      }}>
                        <div style={{
                          fontSize: '0.7rem',
                          letterSpacing: '0.1em',
                          textTransform: 'uppercase',
                          color: '#a0a0a0',
                          marginBottom: '0.5rem'
                        }}>
                          {label}
                        </div>
                        <div style={{
                          fontSize: isMobile ? '0.85rem' : '0.9rem',
                          lineHeight: 1.5
                        }}>
                          {niche.ideas[type] || 'Generating...'}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Collider />);
    </script>
</body>
</html>
