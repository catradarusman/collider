<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>COLLIDER</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="mask-icon" href="/favicon.svg" color="#e5342a">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Farcaster Miniapp (optional layer; harmless in web2) -->
    <meta name="fc:miniapp" content='{"version":"1","imageUrl":"https://collider.catra.fyi/assets/og-image.png","button":{"title":"Find Your Niche","action":{"type":"launch_miniapp","url":"https://collider.catra.fyi","name":"COLLIDER","splashImageUrl":"https://collider.catra.fyi/assets/splash.png","splashBackgroundColor":"#ffffff"}}}' />
    <script type="module">
      import { sdk } from 'https://esm.sh/@farcaster/miniapp-sdk';
      window.__farcasterSdk = sdk;
    </script>

    <style>
      /* ============ COLLIDER — Swiss poster design system ============ */
      :root{
        --paper:#ffffff; --ink:#0a0a0a; --accent:#e5342a; --accent-ink:#ffffff;
        --muted:#6b6b6b; --line:#0a0a0a; --line-soft:#e4e4e4; --fill-soft:#f4f4f2;
        --sans:'Space Grotesk',system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,monospace;
        --maxw:1120px; --ease:cubic-bezier(.2,.8,.2,1);
      }
      *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
      html{-webkit-text-size-adjust:100%;}
      body{background:var(--paper);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow-x:hidden;}
      button,input,textarea{font-family:inherit;}
      button{-webkit-appearance:none;cursor:pointer;}
      input,textarea{-webkit-appearance:none;}
      ::selection{background:var(--accent);color:var(--accent-ink);}
      ::placeholder{color:#a6a6a6;}
      .wrap{max-width:var(--maxw);margin:0 auto;padding:0 clamp(1rem,4vw,2.5rem);}

      /* masthead */
      .mast{border-bottom:2px solid var(--ink);padding:clamp(1.25rem,4vw,2rem) 0 clamp(1rem,3vw,1.5rem);display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
      .wordmark{font-family:var(--sans);font-weight:700;font-size:clamp(2.4rem,9vw,5rem);line-height:.86;letter-spacing:-.045em;text-transform:uppercase;display:flex;align-items:baseline;gap:.12em;background:none;border:0;padding:0;color:var(--ink);cursor:pointer;transition:opacity .15s;}
      .wordmark:hover{opacity:.7;}
      .wordmark:focus-visible{outline:3px solid var(--accent);outline-offset:4px;}
      .wordmark .dot{width:.5em;height:.5em;background:var(--accent);display:inline-block;transform:translateY(-.02em);}
      .strap{font-family:var(--mono);font-size:clamp(.6rem,1.6vw,.72rem);letter-spacing:.18em;text-transform:uppercase;color:var(--muted);text-align:right;line-height:1.5;}

      /* phase bar */
      .phases{display:flex;border-bottom:2px solid var(--ink);}
      .phase{flex:1;padding:clamp(.7rem,2.5vw,1.1rem) clamp(.6rem,2vw,1.25rem);border-right:1px solid var(--line-soft);display:flex;align-items:center;gap:.6rem;color:var(--muted);transition:color .3s,background .3s;}
      .phase .pn{font-family:var(--mono);font-weight:700;font-size:clamp(.9rem,3vw,1.15rem);}
      .phase .pl{font-family:var(--mono);font-size:clamp(.58rem,1.7vw,.72rem);letter-spacing:.14em;text-transform:uppercase;}
      .phase.is-active{background:var(--accent);color:var(--accent-ink);}
      /* chamber nav tab — right-aligned in the phase bar, visually distinct from journey steps */
      .chamber-tab{flex-shrink:0;background:var(--fill-soft);border:0;border-left:2px solid var(--ink);color:var(--ink);font-family:var(--mono);font-weight:700;font-size:clamp(.58rem,1.7vw,.72rem);letter-spacing:.13em;text-transform:uppercase;padding:0 clamp(.85rem,2.6vw,1.4rem);display:flex;align-items:center;gap:.5rem;transition:background .2s,color .2s;}
      .chamber-tab:hover{background:var(--ink);color:var(--paper);}
      .chamber-tab:focus-visible{outline:3px solid var(--accent);outline-offset:-3px;}
      .chamber-tab .ic{color:var(--accent);font-size:1rem;line-height:1;transition:transform .3s var(--ease);}
      .chamber-tab:hover .ic{transform:rotate(180deg);}
      .chamber-tab .cl{display:none;}
      @media(min-width:520px){.chamber-tab .cl{display:inline;}}

      /* section head */
      .shead{display:flex;align-items:flex-start;gap:clamp(.75rem,3vw,1.5rem);padding:clamp(2rem,6vw,3.5rem) 0 clamp(1rem,3vw,1.5rem);}
      .shead .num{font-family:var(--mono);font-weight:700;font-size:clamp(2.5rem,12vw,5.5rem);line-height:.8;letter-spacing:-.03em;}
      .shead .meta{padding-top:.35rem;}
      .shead h2{font-weight:700;font-size:clamp(1.4rem,5vw,2.4rem);line-height:1;letter-spacing:-.02em;text-transform:uppercase;}
      .shead p{margin-top:.6rem;color:var(--muted);font-size:clamp(.9rem,2.4vw,1.05rem);line-height:1.5;max-width:54ch;}

      /* fields */
      .field{width:100%;background:var(--paper);border:2px solid var(--ink);color:var(--ink);padding:clamp(.85rem,3vw,1.1rem);font-size:1rem;line-height:1.5;transition:box-shadow .12s var(--ease),border-color .12s;}
      textarea.field{min-height:clamp(150px,30vh,230px);resize:vertical;}
      .field:focus{outline:none;box-shadow:4px 4px 0 var(--accent);}
      .counter{font-family:var(--mono);font-size:.75rem;color:var(--muted);text-align:right;margin-top:.5rem;letter-spacing:.05em;}

      /* buttons */
      .btn{border:2px solid var(--ink);background:var(--paper);color:var(--ink);font-family:var(--mono);font-weight:700;font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;padding:clamp(.85rem,2.6vw,1rem) clamp(1.1rem,3vw,1.5rem);min-height:52px;display:inline-flex;align-items:center;justify-content:center;gap:.5rem;transition:transform .12s var(--ease),box-shadow .12s var(--ease),background .2s,color .2s;}
      .btn:hover{transform:translate(-3px,-3px);box-shadow:5px 5px 0 var(--ink);}
      .btn:active{transform:translate(0,0);box-shadow:none;}
      .btn:focus-visible{outline:3px solid var(--accent);outline-offset:2px;}
      .btn[disabled]{opacity:.45;pointer-events:none;}
      .btn--primary{background:var(--ink);color:var(--paper);}
      .btn--primary:hover{box-shadow:5px 5px 0 var(--accent);}
      .btn--accent{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);}
      .btn--accent:hover{box-shadow:5px 5px 0 var(--ink);}
      .btn--full{width:100%;}
      .btn-row{display:grid;grid-template-columns:1fr;gap:.75rem;}
      @media(min-width:640px){.btn-row{grid-template-columns:repeat(2,1fr);}}

      .rise{opacity:0;transform:translateY(14px);animation:rise .5s var(--ease) forwards;}
      @keyframes rise{to{opacity:1;transform:none;}}

      /* ---- home ---- */
      .home{padding-bottom:4rem;}
      .hero-line{font-weight:700;font-size:clamp(2rem,7vw,4rem);line-height:1.02;letter-spacing:-.03em;margin:clamp(2.5rem,7vw,4rem) 0 1.25rem;max-width:16ch;}
      .hero-line em{font-style:normal;color:var(--accent);}
      .hero-sub{font-size:clamp(1rem,2.6vw,1.3rem);line-height:1.5;color:var(--muted);max-width:46ch;margin-bottom:clamp(2rem,5vw,3rem);}
      .why{display:grid;grid-template-columns:1fr;gap:0;border-top:2px solid var(--ink);border-bottom:2px solid var(--ink);margin-bottom:clamp(2rem,5vw,3rem);}
      @media(min-width:768px){.why{grid-template-columns:repeat(3,1fr);}}
      .why-item{padding:1.5rem 1.25rem 1.75rem;border-bottom:1px solid var(--line-soft);}
      @media(min-width:768px){.why-item{border-bottom:0;border-right:1px solid var(--line-soft);} .why-item:last-child{border-right:0;}}
      .why-item .wn{font-family:var(--mono);font-weight:700;font-size:1.1rem;color:var(--accent);}
      .why-item h3{font-size:1.15rem;font-weight:600;margin:.5rem 0 .4rem;letter-spacing:-.01em;}
      .why-item p{font-size:.92rem;line-height:1.5;color:var(--muted);}
      .steps{display:flex;flex-wrap:wrap;gap:.5rem 1.25rem;font-family:var(--mono);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:2rem;}
      .steps b{color:var(--ink);}

      /* converge */
      .defs{display:grid;grid-template-columns:1fr;gap:1rem;border:2px solid var(--ink);padding:clamp(1rem,3vw,1.5rem);margin-bottom:1.5rem;}
      @media(min-width:768px){.defs{grid-template-columns:repeat(3,1fr);}}
      .def h4{font-family:var(--mono);font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;margin-bottom:.3rem;}
      .def p{font-size:.82rem;color:var(--muted);line-height:1.45;}
      .cols{display:grid;grid-template-columns:1fr;gap:1rem;}
      @media(min-width:768px){.cols{grid-template-columns:repeat(3,1fr);}}
      .col{border:2px solid var(--ink);padding:1rem;min-height:120px;transition:box-shadow .12s,background .12s;}
      .col.drop-on{box-shadow:5px 5px 0 var(--accent);background:var(--fill-soft);}
      .col-head{display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--ink);padding-bottom:.5rem;margin-bottom:.85rem;font-family:var(--mono);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;}
      .col-head .n{background:var(--ink);color:var(--paper);padding:.05rem .4rem;font-weight:700;}
      .tag{display:flex;justify-content:space-between;align-items:center;gap:.5rem;border:1px solid var(--ink);padding:.55rem .5rem .55rem .7rem;margin-bottom:.5rem;background:var(--paper);transition:transform .12s,box-shadow .12s;}
      .tag[draggable=true]{cursor:grab;}
      .tag:hover{transform:translate(-2px,-2px);box-shadow:3px 3px 0 var(--ink);}
      .tag span{font-size:.9rem;word-break:break-word;}
      .tag .x{background:none;border:0;color:var(--muted);font-size:1.4rem;line-height:1;width:40px;height:40px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:color .15s;}
      .tag .x:hover{color:var(--accent);}
      .addrow{display:flex;gap:.5rem;margin-top:.5rem;}
      .addrow .field{padding:.6rem .7rem;min-height:48px;}
      .addrow .plus{border:2px solid var(--ink);background:var(--paper);width:48px;min-height:48px;font-size:1.2rem;font-weight:700;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;}
      .addrow .plus:hover{background:var(--ink);color:var(--paper);}

      /* consent — the storage choice, made before anything is kept */
      .consent{border:2px solid var(--ink);margin-top:clamp(1.5rem,4vw,2rem);max-width:620px;margin-inline:auto;}
      .consent-main{width:100%;background:var(--paper);border:0;text-align:left;display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;padding:clamp(1rem,3vw,1.25rem);transition:background .18s var(--ease);}
      .consent-main:hover{background:var(--fill-soft);}
      .consent-main:focus-visible{outline:3px solid var(--accent);outline-offset:-3px;}
      .consent-copy{display:block;}
      .consent-copy .ct{display:block;font-family:var(--mono);font-size:.72rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;}
      .consent-copy .cs{display:block;margin-top:.45rem;font-size:.86rem;line-height:1.5;color:var(--muted);text-wrap:pretty;}
      .sw{flex-shrink:0;width:52px;height:30px;border:2px solid var(--ink);background:var(--paper);display:flex;align-items:center;padding:2px;transition:background .18s var(--ease),border-color .18s var(--ease);}
      .sw i{width:22px;height:22px;background:var(--ink);transition:transform .22s var(--ease),background .18s var(--ease);}
      .sw.on{background:var(--accent);border-color:var(--accent);}
      .sw.on i{transform:translateX(22px);background:var(--accent-ink);}
      .consent-more{width:100%;text-align:left;background:var(--fill-soft);border:0;border-top:1px solid var(--line-soft);font-family:var(--mono);font-size:.64rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:.7rem clamp(1rem,3vw,1.25rem);min-height:44px;transition:color .18s;}
      .consent-more:hover{color:var(--ink);}
      .consent-more:focus-visible{outline:3px solid var(--accent);outline-offset:-3px;}
      .consent-note{border-top:1px solid var(--line-soft);padding:clamp(.9rem,3vw,1.1rem) clamp(1rem,3vw,1.25rem);font-size:.84rem;line-height:1.6;color:var(--muted);text-wrap:pretty;animation:rise .35s var(--ease) forwards;}
      .consent-note b{color:var(--ink);font-weight:600;}

      /* result */
      .result{max-width:780px;margin:0 auto;}
      .hero{border:2px solid var(--ink);}
      .hero-top{display:flex;justify-content:space-between;align-items:center;gap:1rem;padding:clamp(1rem,3vw,1.4rem);border-bottom:2px solid var(--ink);background:var(--ink);color:var(--paper);}
      .hero-top .lbl{font-family:var(--mono);font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:#bdbdbd;}
      .grade{display:flex;align-items:center;gap:.7rem;}
      .grade .band{width:46px;height:46px;background:var(--accent);color:var(--accent-ink);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:1.5rem;}
      .grade .num{font-family:var(--mono);font-weight:700;font-size:clamp(2rem,7vw,2.8rem);line-height:1;}
      .grade .num small{font-size:.85rem;color:#9a9a9a;font-weight:500;}
      .hero-body{padding:clamp(1rem,3vw,1.5rem);}
      .axes{display:grid;gap:.6rem;margin-bottom:1.2rem;}
      .axis{border:1px solid var(--ink);padding:.8rem .9rem;}
      .axis .k{font-family:var(--mono);font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.35rem;}
      .axis .v{font-size:clamp(1rem,3vw,1.15rem);font-weight:500;line-height:1.3;}
      .quote{border-left:4px solid var(--accent);padding:.2rem 0 .2rem 1rem;font-size:clamp(1rem,3vw,1.2rem);line-height:1.45;font-weight:500;margin:.4rem 0 0;}
      .meters{margin-top:1.25rem;display:grid;gap:.55rem;}
      .meter{display:flex;align-items:center;gap:.75rem;}
      .meter .mk{font-family:var(--mono);font-size:.6rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);width:118px;flex-shrink:0;}
      .meter .track{flex:1;height:8px;background:var(--fill-soft);border:1px solid var(--line-soft);}
      .meter .fill{height:100%;background:var(--accent);}
      .meter .mv{font-family:var(--mono);font-size:.7rem;width:30px;text-align:right;}

      .alts{margin:1.75rem 0;}
      .kicker{font-family:var(--mono);font-size:.64rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:.75rem;}
      .alt{width:100%;text-align:left;background:var(--paper);cursor:pointer;font-family:inherit;display:flex;justify-content:space-between;align-items:center;gap:1rem;border:1px solid var(--ink);padding:.7rem .85rem;margin-bottom:.5rem;transition:transform .12s,box-shadow .12s,border-color .2s;}
      .alt:hover{transform:translate(-2px,-2px);box-shadow:3px 3px 0 var(--ink);}
      .alt.is-active{border-color:var(--accent);border-width:2px;}
      .alt .txt{font-size:.86rem;}
      .alt .sc{font-family:var(--mono);font-size:.78rem;color:var(--muted);white-space:nowrap;}
      .alt.is-active .sc{color:var(--accent);font-weight:700;}
      .ideas-loading{border:2px dashed var(--ink);padding:2rem;text-align:center;font-family:var(--mono);font-size:.82rem;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;}

      .ideas{display:grid;gap:1rem;}
      .idea{border:2px solid var(--ink);padding:clamp(1rem,3vw,1.25rem);transition:transform .12s,box-shadow .12s,border-color .3s;}
      .idea:hover{transform:translate(-3px,-3px);box-shadow:5px 5px 0 var(--ink);}
      .idea.is-pick{border-color:var(--accent);}
      .idea.is-pick:hover{box-shadow:5px 5px 0 var(--accent);}
      .idea-head{display:flex;justify-content:space-between;align-items:center;gap:.5rem;margin-bottom:.6rem;}
      .idea-head .t{font-family:var(--mono);font-size:.64rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
      .idea .name{font-size:clamp(1.05rem,3vw,1.2rem);font-weight:600;margin-bottom:.3rem;line-height:1.2;}
      .idea .for{font-size:.76rem;color:var(--muted);margin-bottom:.6rem;}
      .idea .pitch{font-size:.95rem;line-height:1.5;}
      .pick-chip{font-family:var(--mono);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;background:var(--accent);color:var(--accent-ink);padding:.18rem .45rem;font-weight:700;}
      .money{margin-top:.85rem;display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;}
      .money .bt{font-family:var(--mono);font-size:.6rem;letter-spacing:.11em;text-transform:uppercase;color:var(--muted);}
      .money .dollars{font-family:var(--mono);font-weight:700;font-size:1.25rem;letter-spacing:.06em;line-height:1;}
      .money .dollars b{color:var(--line-soft);}
      .money .dollars b.on{color:var(--accent);}
      .money .mlabel{font-family:var(--mono);font-size:.72rem;font-weight:500;letter-spacing:.03em;}
      .idea .block{margin-top:.85rem;}
      .idea .block .bt{font-family:var(--mono);font-size:.6rem;letter-spacing:.11em;text-transform:uppercase;color:var(--accent);margin-bottom:.25rem;}
      .idea .block p{font-size:.9rem;line-height:1.5;}

      /* fit rating (user's own take) */
      .fit{margin-top:1rem;padding-top:.9rem;border-top:1px solid var(--line-soft);}
      .fit .bt{font-family:var(--mono);font-size:.6rem;letter-spacing:.11em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;}
      .rates{display:flex;gap:.4rem;}
      .rate{flex:1;border:2px solid var(--ink);background:var(--paper);font-family:var(--mono);font-weight:700;font-size:.68rem;letter-spacing:.06em;text-transform:uppercase;padding:.55rem;min-height:44px;transition:background .15s,color .15s;}
      .rate:hover{background:var(--fill-soft);}
      .rate.on{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);}
      .idea-actions{margin-top:1rem;}

      /* live stats — "the reactor": inputs collide into an output */
      .reactor{position:relative;border:2px solid var(--ink);background:var(--ink);color:var(--paper);margin:clamp(2rem,5vw,3rem) 0;overflow:hidden;}
      .reactor::before{content:"";position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.07) 1px,transparent 1px);background-size:22px 22px;pointer-events:none;}
      .rinputs{position:relative;display:grid;grid-template-columns:repeat(3,1fr);}
      .rcell{padding:clamp(1rem,3.2vw,1.75rem) clamp(.7rem,2.4vw,1.35rem);border-right:1px solid rgba(255,255,255,.14);}
      .rcell:last-child{border-right:0;}
      .rk{font-family:var(--mono);font-size:clamp(.54rem,1.6vw,.68rem);letter-spacing:.16em;text-transform:uppercase;color:#9a9a9a;text-wrap:balance;}
      .rv{display:block;font-family:var(--mono);font-weight:700;font-size:clamp(1.9rem,8.5vw,3.9rem);line-height:.95;letter-spacing:-.03em;font-variant-numeric:tabular-nums;margin:.3rem 0 .7rem;}
      .rbar{height:5px;background:rgba(255,255,255,.13);overflow:hidden;}
      .rbar i{display:block;height:100%;background:var(--accent);width:0;transition:width 1.05s var(--ease);}
      .rflow{position:relative;display:flex;align-items:center;justify-content:center;gap:.85rem;padding:.6rem;font-family:var(--mono);font-size:.62rem;font-weight:700;letter-spacing:.4em;text-indent:.4em;text-transform:uppercase;border-top:1px solid rgba(255,255,255,.14);border-bottom:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.035);}
      .rflow .car{color:var(--accent);font-size:.9rem;line-height:1;animation:carbob 1.6s var(--ease) infinite;}
      .rflow .car:last-child{animation-delay:.2s;}
      @keyframes carbob{0%,100%{transform:translateY(-1px);opacity:.75;}50%{transform:translateY(2px);opacity:1;}}
      .rout{position:relative;display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:clamp(.9rem,3vw,1.5rem) clamp(1rem,3.2vw,1.6rem);background:var(--accent);color:var(--accent-ink);}
      .rout::after{content:"";position:absolute;inset:0;background:radial-gradient(120% 180% at 100% 50%,rgba(255,255,255,.18),transparent 55%);pointer-events:none;}
      .rok{position:relative;font-family:var(--mono);font-size:clamp(.58rem,1.8vw,.72rem);letter-spacing:.16em;text-transform:uppercase;font-weight:700;max-width:9ch;line-height:1.3;text-wrap:balance;}
      .rov{position:relative;font-family:var(--mono);font-weight:700;font-size:clamp(2.6rem,12vw,4.6rem);line-height:.82;letter-spacing:-.035em;font-variant-numeric:tabular-nums;}
      /* live ticker tape (home) */
      .ticker{position:relative;display:flex;align-items:stretch;border:2px solid var(--ink);background:var(--ink);color:var(--paper);margin:clamp(1.75rem,4vw,2.5rem) 0;overflow:hidden;}
      .ticker-live{flex-shrink:0;display:flex;align-items:center;gap:.5rem;background:var(--accent);color:var(--accent-ink);font-family:var(--mono);font-weight:700;font-size:.64rem;letter-spacing:.16em;text-transform:uppercase;padding:0 clamp(.7rem,2vw,1rem);z-index:2;}
      .ticker-live .dot{width:.5rem;height:.5rem;border-radius:50%;background:var(--accent-ink);animation:blip 1.4s steps(1) infinite;}
      @keyframes blip{0%,60%{opacity:1;}61%,100%{opacity:.2;}}
      .ticker-mask{position:relative;flex:1;overflow:hidden;}
      .ticker-mask::before,.ticker-mask::after{content:"";position:absolute;top:0;bottom:0;width:2.5rem;z-index:1;pointer-events:none;}
      .ticker-mask::before{left:0;background:linear-gradient(90deg,var(--ink),transparent);}
      .ticker-mask::after{right:0;background:linear-gradient(270deg,var(--ink),transparent);}
      .ticker-track{display:inline-flex;align-items:center;white-space:nowrap;will-change:transform;animation:ticker 60s linear infinite;}
      .ticker:hover .ticker-track{animation-play-state:paused;}
      @keyframes ticker{from{transform:translateX(0);}to{transform:translateX(-50%);}}
      .tk{display:inline-flex;align-items:baseline;gap:.5rem;padding:.7rem 0 .7rem clamp(.9rem,2.4vw,1.4rem);font-family:var(--mono);font-size:.82rem;}
      .tk .tcat{font-size:.56rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:.12rem .35rem;line-height:1;}
      .tk .tcat.skill{background:var(--accent);color:var(--accent-ink);}
      .tk .tcat.interest{color:var(--accent);border:1px solid var(--accent);}
      .tk .tcat.opportunity{color:var(--paper);border:1px solid rgba(255,255,255,.4);}
      .tk .tlabel{color:var(--paper);}
      .tk .tsep{color:rgba(255,255,255,.28);padding-left:clamp(.9rem,2.4vw,1.4rem);}

      .seelink{background:none;border:0;font-family:var(--mono);font-size:.74rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);padding:.4rem 0;display:inline-flex;align-items:center;gap:.4rem;min-height:44px;transition:gap .15s var(--ease),transform .12s var(--ease);}
      .seelink:hover{gap:.7rem;}
      .seelink:active{transform:scale(.96);}
      .seelink:focus-visible{outline:3px solid var(--accent);outline-offset:2px;}

      /* collective page */
      .coll-cols{display:grid;grid-template-columns:1fr;gap:clamp(1rem,3vw,1.5rem);}
      @media(min-width:768px){.coll-cols{grid-template-columns:repeat(3,1fr);}}
      .coll-col{border:2px solid var(--ink);padding:clamp(1rem,3vw,1.25rem);}
      .coll-col h3{font-family:var(--mono);font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;border-bottom:2px solid var(--ink);padding-bottom:.55rem;margin-bottom:.35rem;display:flex;justify-content:space-between;align-items:center;}
      .coll-col h3 .n{background:var(--ink);color:var(--paper);font-weight:700;padding:.05rem .4rem;}
      .crow{display:flex;justify-content:space-between;align-items:center;gap:.75rem;padding:.5rem 0;border-bottom:1px solid var(--line-soft);}
      .crow:last-child{border-bottom:0;}
      .crow .cl{font-size:.92rem;line-height:1.35;word-break:break-word;text-wrap:pretty;}
      .crow .cc{font-family:var(--mono);font-size:.76rem;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;flex-shrink:0;}
      .coll-empty{border:2px dashed var(--ink);padding:2.5rem 1.5rem;text-align:center;font-family:var(--mono);font-size:.82rem;letter-spacing:.05em;color:var(--muted);text-transform:uppercase;}

      /* footer / privacy */
      .foot{border-top:2px solid var(--ink);margin-top:clamp(2.5rem,6vw,4rem);padding:clamp(1.5rem,4vw,2rem) 0 clamp(2.5rem,5vw,3rem);display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;flex-wrap:wrap;}
      .foot .fp{font-family:var(--mono);font-size:.7rem;line-height:1.6;letter-spacing:.04em;color:var(--muted);max-width:52ch;text-wrap:pretty;}
      .foot .fm{font-family:var(--mono);font-size:.64rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);white-space:nowrap;display:inline-flex;flex-direction:column;align-items:flex-end;gap:.45rem;}
      .foot .fby{font-size:.64rem;letter-spacing:.1em;color:var(--muted);text-decoration:none;border-bottom:1px solid var(--line-soft);padding:.2rem 0;transition:color .18s var(--ease),border-color .18s var(--ease);}
      .foot .fby:hover{color:var(--accent);border-color:var(--accent);}
      .foot .fby:focus-visible{outline:3px solid var(--accent);outline-offset:3px;}
      /* once the footer wraps, the block sits at the left edge — rag left with it */
      @media(max-width:639px){.foot .fm{align-items:flex-start;}}

      @media(prefers-reduced-motion:reduce){
        *{animation:none!important;transition:none!important;}
        .btn:hover,.idea:hover,.tag:hover,.alt:hover{transform:none;}
        .rise{opacity:1;transform:none;}
      }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        // Same-origin: one Node service serves both this page and /api/*.
        const API_URL = '';

        function Btn({ children, onClick, disabled, variant, full, style }) {
          const v = variant ? ` btn--${variant}` : '';
          return <button className={`btn${v}${full ? ' btn--full' : ''}`} onClick={onClick} disabled={disabled} style={style}>{children}</button>;
        }
        function Mast({ onHome }) {
          return (
            <header className="mast">
              <button className="wordmark" onClick={onHome} aria-label="Back to home">COLLIDER<span className="dot" /></button>
              <div className="strap">Three lists.<br/>One niche.<br/>Three pitches.</div>
            </header>
          );
        }
        function Phases({ phase, onChamber }) {
          const steps = [['collect', 'Collect'], ['converge', 'Converge'], ['result', 'Collide']];
          return (
            <nav className="phases">
              {steps.map(([id, label], i) => (
                <div key={id} className={`phase${phase === id ? ' is-active' : ''}`}><span className="pn">0{i + 1}</span><span className="pl">{label}</span></div>
              ))}
              {onChamber && <button className="chamber-tab" onClick={onChamber} aria-label="Open the Chamber"><span className="ic">◎</span><span className="cl">The Chamber</span></button>}
            </nav>
          );
        }
        function SHead({ num, title, children }) {
          return <div className="shead"><div className="num">{num}</div><div className="meta"><h2>{title}</h2><p>{children}</p></div></div>;
        }
        // Count-up for the live stats. Respects reduced-motion (jumps to final).
        function useCountUp(target, ms = 900) {
          const [n, setN] = useState(0);
          useEffect(() => {
            const t = Number(target) || 0;
            if (window.matchMedia?.('(prefers-reduced-motion:reduce)').matches) { setN(t); return; }
            let raf, start;
            const step = ts => { start ??= ts; const p = Math.min(1, (ts - start) / ms); setN(Math.round((1 - Math.pow(1 - p, 3)) * t)); if (p < 1) raf = requestAnimationFrame(step); };
            raf = requestAnimationFrame(step);
            return () => cancelAnimationFrame(raf);
          }, [target, ms]);
          return n;
        }
        function CountNum({ value, className }) {
          const n = useCountUp(value);
          return <span className={className}>{n.toLocaleString()}</span>;
        }
        // Live scrolling tape of newly submitted categories (stock-ticker style).
        function Ticker({ recent }) {
          if (!recent || !recent.length) return null;
          const run = recent.concat(recent); // duplicated for a seamless loop
          return (
            <div className="ticker rise">
              <div className="ticker-live"><span className="dot" />Live</div>
              <div className="ticker-mask">
                <div className="ticker-track">
                  {run.map((it, i) => (
                    <span className="tk" key={i} aria-hidden={i >= recent.length}>
                      <span className={`tcat ${it.cat}`}>{it.cat}</span>
                      <span className="tlabel">{it.label}</span>
                      <span className="tsep">/</span>
                    </span>
                  ))}
                </div>
              </div>
            </div>
          );
        }
        function Stats({ totals }) {
          const [grown, setGrown] = useState(false);
          useEffect(() => {
            if (window.matchMedia?.('(prefers-reduced-motion:reduce)').matches) { setGrown(true); return; }
            const t = setTimeout(() => setGrown(true), 90);
            return () => clearTimeout(t);
          }, []);
          if (!totals) return null;
          const inputs = [['skills', 'Skills'], ['interests', 'Interests'], ['opportunities', 'Opportunities']];
          const max = Math.max(1, totals.skills, totals.interests, totals.opportunities);
          return (
            <div className="reactor rise">
              <div className="rinputs">
                {inputs.map(([k, label]) => {
                  const v = totals[k] || 0;
                  const pct = grown ? Math.max(v > 0 ? 8 : 0, Math.round((v / max) * 100)) : 0;
                  return (
                    <div className="rcell" key={k}>
                      <div className="rk">{label}</div>
                      <CountNum className="rv" value={v} />
                      <div className="rbar"><i style={{ width: pct + '%' }} /></div>
                    </div>
                  );
                })}
              </div>
              <div className="rflow"><span className="car">▽</span>Collide<span className="car">▽</span></div>
              <div className="rout"><span className="rok">Niches graded</span><CountNum className="rov" value={totals.collisions} /></div>
            </div>
          );
        }
        function Footer() {
          return (
            <footer className="foot">
              <p className="fp">Anonymous by design. No account, no email, nothing to tie your words to you. Share your dots and they join the ticker and the Chamber. Keep them private with one tap before you collide. Your call.</p>
              <span className="fm">COLLIDER<a className="fby" href="https://catra.fyi" target="_blank" rel="noopener noreferrer">Made by catra.fyi ↗</a></span>
            </footer>
          );
        }
        function ErrorBar({ msg, onClose }) {
          if (!msg) return null;
          return <div style={{ border: '2px solid var(--accent)', background: '#fff5f4', color: '#8a1a12', padding: '.85rem 1rem', display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: '1rem', fontSize: '.9rem', marginTop: '1.25rem' }}><span>{msg}</span><button onClick={onClose} style={{ background: 'none', border: 0, color: '#8a1a12', fontSize: '1.3rem' }}>×</button></div>;
        }

        // ================= APP =================
        function Collider() {
          const [phase, setPhase] = useState('home');
          const [collectText, setCollectText] = useState('');
          const [isLoading, setIsLoading] = useState(false);
          const [error, setError] = useState('');
          const [dragged, setDragged] = useState(null);
          const [dropCol, setDropCol] = useState(null);
          const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
          const [state, setState] = useState({ skills: [], interests: [], opportunities: [] });
          const [result, setResult] = useState(null);
          const [stats, setStats] = useState(null);
          // Storage consent. Defaults to on, remembered locally, changeable any
          // time before the collide. Nothing is stored until it is read below.
          const [share, setShare] = useState(() => { try { return localStorage.getItem('collider:share') !== '0'; } catch { return true; } });
          const updateShare = v => { setShare(v); try { localStorage.setItem('collider:share', v ? '1' : '0'); } catch {} };

          const loadStats = () => fetch(`${API_URL}/api/stats`).then(r => r.json()).then(j => { if (j.success) setStats(j.data); }).catch(() => {});
          useEffect(() => { loadStats(); const id = setInterval(loadStats, 30000); return () => clearInterval(id); }, []);

          useEffect(() => { const sdk = window.__farcasterSdk; if (sdk) sdk.actions.ready(); }, []);
          useEffect(() => { const h = () => setIsMobile(window.innerWidth < 768); window.addEventListener('resize', h); return () => window.removeEventListener('resize', h); }, []);

          const parseItems = t => t.split(/[,\n;]+/).map(s => s.trim()).filter(Boolean);

          const categorize = async () => {
            const items = parseItems(collectText);
            if (items.length === 0) return setError('Add a few things first.');
            if (items.length > 50) return setError('Keep it under 50.');
            setError(''); setIsLoading(true);
            try {
              const r = await fetch(`${API_URL}/api/categorize`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ items }) });
              const j = await r.json();
              if (!j.success) throw new Error(j.error || 'Sort failed');
              setState({ skills: j.data.skills || [], interests: j.data.interests || [], opportunities: j.data.opportunities || [] });
              setPhase('converge');
            } catch (e) { console.error(e); setError("Couldn't reach the server. Give it another go."); }
            finally { setIsLoading(false); }
          };

          const removeItem = (item, cat) => setState(p => ({ ...p, [cat]: p[cat].filter(i => i !== item) }));
          const addItem = (item, cat) => { if (item.trim()) setState(p => ({ ...p, [cat]: [...p[cat], item.trim()] })); };
          const onDrop = target => {
            if (dragged && dragged.cat !== target) setState(p => ({ ...p, [dragged.cat]: p[dragged.cat].filter(i => i !== dragged.item), [target]: [...p[target], dragged.item] }));
            setDragged(null); setDropCol(null);
          };

          const collide = async () => {
            if (!state.skills.length || !state.interests.length || !state.opportunities.length) return setError('Need at least one in each column.');
            setError(''); setIsLoading(true); setResult(null);
            try {
              const r = await fetch(`${API_URL}/api/collide`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ...state, share }) });
              const j = await r.json();
              if (!j.success) throw new Error(j.error || 'Collide failed');
              setResult(j.data); setPhase('result');
              if (share) loadStats(); // their dots just landed in the Chamber
            } catch (e) { console.error(e); setError('The collision failed. Try again.'); }
            finally { setIsLoading(false); }
          };

          const startOver = () => { setPhase('collect'); setCollectText(''); setState({ skills: [], interests: [], opportunities: [] }); setResult(null); setError(''); };

          return (
            <div className="wrap">
              <Mast onHome={() => setPhase('home')} />
              {['collect', 'converge', 'result'].includes(phase) && <Phases phase={phase} onChamber={() => setPhase('collective')} />}
              <ErrorBar msg={error} onClose={() => setError('')} />

              {phase === 'home' && <Home onStart={() => setPhase('collect')} stats={stats} onCollective={() => setPhase('collective')} />}
              {phase === 'collect' && <Collect text={collectText} setText={setCollectText} count={parseItems(collectText).length} onNext={categorize} isLoading={isLoading} />}
              {phase === 'converge' && <Converge state={state} isMobile={isMobile} onRemove={removeItem} onAdd={addItem} dragged={dragged} setDragged={setDragged} dropCol={dropCol} setDropCol={setDropCol} onDrop={onDrop} onBack={() => setPhase('collect')} onCollide={collide} isLoading={isLoading} share={share} setShare={updateShare} />}
              {phase === 'result' && result && <Result result={result} onBack={() => setPhase('converge')} onStartOver={startOver} share={share} />}
              {phase === 'collective' && <Collective stats={stats} onStart={() => setPhase('collect')} onHome={() => setPhase('home')} />}
              {phase === 'home' && <Footer />}
            </div>
          );
        }

        // ---------- Home ----------
        function Home({ onStart, stats, onCollective }) {
          const why = [
            ['01', 'Beats the blank page', 'Bring the raw dots. Collider finds the one intersection worth betting on.'],
            ['02', 'Graded, not guessed', 'A real score ranks your crossings. Same dots, same answer. No dice, no vibes.'],
            ['03', 'Ready to pitch', 'Every niche ships with three concrete ideas and a one-pager you can hand to anyone.'],
          ];
          const hasData = !!(stats && (stats.recent?.length || stats.totals.collisions));
          return (
            <section className="home rise">
              <h1 className="hero-line">Stuck for ideas? <em>Collide</em> your way out.</h1>
              <p className="hero-sub">What you're good at. What you love. Where the world's going. Collider smashes all three into one niche you can actually build, and pitch.</p>
              <Ticker recent={stats?.recent} />
              {hasData && <div style={{ marginTop: 'clamp(-.5rem,-2vw,-1rem)', marginBottom: 'clamp(2rem,5vw,3rem)' }}><button className="seelink" onClick={onCollective}>◎ Enter the Chamber →</button></div>}
              <div className="why">
                {why.map(([n, h, p]) => (
                  <div className="why-item" key={n}><div className="wn">{n}</div><h3>{h}</h3><p>{p}</p></div>
                ))}
              </div>
              <div className="steps"><span><b>01</b> Collect your dots</span><span><b>02</b> Converge into 3 lists</span><span><b>03</b> Collide into a niche</span></div>
              <Btn variant="accent" onClick={onStart} full>Start →</Btn>
            </section>
          );
        }

        // ---------- Collective (what everyone is submitting) ----------
        function Collective({ stats, onStart, onHome }) {
          const cols = [['skills', 'Skills'], ['interests', 'Interests'], ['opportunities', 'Opportunities']];
          const cats = stats?.categories;
          const any = cats && (cats.skills.length || cats.interests.length || cats.opportunities.length);
          return (
            <section className="rise">
              <SHead num="◎" title="The Chamber">Where shared collisions land. Every dot people chose to add, ranked by how often it shows up. Live and anonymous. Nothing here is tied to a person; anyone can opt out before they collide.</SHead>
              {stats && <Stats totals={stats.totals} />}
              {any ? (
                <div className="coll-cols">
                  {cols.map(([key, label]) => (
                    <div className="coll-col" key={key}>
                      <h3><span>{label}</span><span className="n">{cats[key].length}</span></h3>
                      {cats[key].length === 0
                        ? <div className="crow"><span className="cl" style={{ color: 'var(--muted)' }}>Nothing yet</span></div>
                        : cats[key].map(({ label: l, count }) => (
                          <div className="crow" key={l}><span className="cl">{l}</span><span className="cc">{count}×</span></div>
                        ))}
                    </div>
                  ))}
                </div>
              ) : (
                <div className="coll-empty">No dots yet. Be the first to collide.</div>
              )}
              <div className="btn-row" style={{ marginTop: '2rem' }}>
                <Btn onClick={onHome}>← Home</Btn>
                <Btn variant="accent" onClick={onStart}>Start yours →</Btn>
              </div>
              <Footer />
            </section>
          );
        }

        // ---------- 01 Collect ----------
        function Collect({ text, setText, count, onNext, isLoading }) {
          return (
            <section className="rise">
              <SHead num="01" title="Dump everything">Skills. Obsessions. Problems that nag you. Things you're weirdly good at. One per line or comma-separated. Don't filter yet.</SHead>
              <textarea className="field" value={text} onChange={e => setText(e.target.value)} placeholder="workshop facilitation, indie music, blockchain, fitness coaching, spreadsheets, burnout..." />
              <div className="counter">{count} / 50</div>
              <div style={{ marginTop: '2rem' }}><Btn variant="accent" onClick={onNext} disabled={isLoading} full>{isLoading ? 'Sorting…' : 'Sort my dots →'}</Btn></div>
            </section>
          );
        }

        // ---------- 02 Converge ----------
        // The storage choice, shown at the moment it applies — right above Collide.
        function Consent({ share, setShare }) {
          const [open, setOpen] = useState(false);
          return (
            <div className="consent">
              <button className="consent-main" role="switch" aria-checked={share} onClick={() => setShare(!share)}>
                <span className="consent-copy">
                  <span className="ct">Add my dots to the Chamber</span>
                  <span className="cs">{share
                    ? 'On. Your three lists join the public wall and the live ticker. The words only: no name, no account, no email.'
                    : 'Off. Nothing you typed gets stored. Your collision runs exactly the same.'}</span>
                </span>
                <span className={`sw${share ? ' on' : ''}`} aria-hidden="true"><i /></span>
              </button>
              <button className="consent-more" onClick={() => setOpen(o => !o)} aria-expanded={open}>{open ? '− Why we ask' : '+ Why we ask'}</button>
              {open && (
                <p className="consent-note">
                  COLLIDER never asks who you are. <b>No account, no email, no login</b>, so there is nothing here to profile you with, and nothing to sell.
                  Shared dots become anonymous words on a wall: the Chamber and the ticker exist so you can see what everyone else is building around.
                  Turn this off and we keep <b>one anonymous +1</b> for the collision counter and nothing else. Your call, either way. Change it any time before you collide.
                </p>
              )}
            </div>
          );
        }
        function Converge({ state, isMobile, onRemove, onAdd, dragged, setDragged, dropCol, setDropCol, onDrop, onBack, onCollide, isLoading, share, setShare }) {
          const defs = [['Skills', 'What you can do. What people have paid you for.'], ['Interests', "What you love. What you'd read about for free."], ['Opportunities', 'Trends rising. Problems still unsolved.']];
          return (
            <section className="rise">
              <SHead num="02" title="Fix the sort">{isMobile ? "AI took a first pass. Tap × to drop one, add what's missing." : "AI took a first pass. Drag any card to the right column, drop what doesn't fit, add what's missing."}</SHead>
              <div className="defs">{defs.map(([h, p]) => <div className="def" key={h}><h4>{h}</h4><p>{p}</p></div>)}</div>
              <div className="cols">
                {['skills', 'interests', 'opportunities'].map(cat => (
                  <Column key={cat} cat={cat} items={state[cat]} isMobile={isMobile} onRemove={onRemove} onAdd={onAdd} dragged={dragged} setDragged={setDragged} dropCol={dropCol} setDropCol={setDropCol} onDrop={onDrop} />
                ))}
              </div>
              <Consent share={share} setShare={setShare} />
              <div className="btn-row" style={{ marginTop: '1rem', maxWidth: 620, marginInline: 'auto' }}>
                <Btn onClick={onBack}>← Back</Btn>
                <Btn variant="accent" onClick={onCollide} disabled={isLoading}>{isLoading ? 'Colliding…' : 'Collide →'}</Btn>
              </div>
            </section>
          );
        }
        function Column({ cat, items, isMobile, onRemove, onAdd, dragged, setDragged, dropCol, setDropCol, onDrop }) {
          const [input, setInput] = useState('');
          const submit = () => { onAdd(input, cat); setInput(''); };
          const isTarget = dragged && dragged.cat !== cat;
          return (
            <div className={`col${dropCol === cat && isTarget ? ' drop-on' : ''}`}
              onDragOver={!isMobile ? (e => { e.preventDefault(); if (isTarget) setDropCol(cat); }) : undefined}
              onDragLeave={!isMobile ? (() => setDropCol(null)) : undefined}
              onDrop={!isMobile ? (() => onDrop(cat)) : undefined}>
              <div className="col-head"><span>{cat}</span><span className="n">{items.length}</span></div>
              <div style={{ minHeight: 48 }}>
                {items.map(item => (
                  <div className="tag" key={item} draggable={!isMobile}
                    onDragStart={!isMobile ? (() => setDragged({ item, cat })) : undefined}
                    onDragEnd={!isMobile ? (() => { setDragged(null); setDropCol(null); }) : undefined}>
                    <span>{item}</span><button className="x" onClick={() => onRemove(item, cat)} aria-label="remove">×</button>
                  </div>
                ))}
              </div>
              <div className="addrow">
                <input className="field" value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && submit()} placeholder={`Add ${cat.slice(0, -1)}…`} />
                <button className="plus" onClick={submit} aria-label="add">+</button>
              </div>
            </div>
          );
        }

        // ---------- 03 Result ----------
        const nicheKey = n => `${n.skill}|${n.interest}|${n.opportunity}`;
        const MONEY_LABEL = { 1: 'Pocket money', 2: 'Side income', 3: 'Solid living', 4: 'Real business', 5: 'Scalable venture' };

        function Money({ value }) {
          const n = Math.max(0, Math.min(5, value || 0));
          if (!n) return null;
          return (
            <div className="money">
              <span className="bt">$ opportunity</span>
              <span className="dollars">{[1, 2, 3, 4, 5].map(i => <b key={i} className={i <= n ? 'on' : ''}>$</b>)}</span>
              <span className="mlabel">{MONEY_LABEL[n]}</span>
            </div>
          );
        }

        function Result({ result, onBack, onStartOver, share }) {
          const { top, ranking } = result;
          const [active, setActive] = useState(0);
          const [cache, setCache] = useState({ [nicheKey(top)]: { rationale: top.rationale, ideas: top.ideas } });
          const [loadingIdeas, setLoadingIdeas] = useState(false);

          const niche = ranking[active];
          const enriched = cache[nicheKey(niche)];

          const pick = async (i) => {
            if (i === active) return;
            setActive(i);
            const r = ranking[i]; const k = nicheKey(r);
            if (cache[k]) return;
            setLoadingIdeas(true);
            try {
              const res = await fetch(`${API_URL}/api/ideas`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ skill: r.skill, interest: r.interest, opportunity: r.opportunity, share }) });
              const j = await res.json();
              if (j.success) setCache(c => ({ ...c, [k]: j.data }));
            } catch {} finally { setLoadingIdeas(false); }
          };

          return (
            <section className="result rise">
              <SHead num="03" title="Your niche">Your strongest crossing, scored. Same dots, same score, every time. Tap another crossing to see its pitches.</SHead>

              <div className="hero">
                <div className="hero-top">
                  <span className="lbl">Graded niche</span>
                  <div className="grade"><div className="band">{niche.band}</div><div className="num">{niche.grade}<small>/100</small></div></div>
                </div>
                <div className="hero-body">
                  <div className="axes">{['skill', 'interest', 'opportunity'].map(k => <div className="axis" key={k}><div className="k">{k}</div><div className="v">{niche[k]}</div></div>)}</div>
                  {enriched?.rationale && <p className="quote">{enriched.rationale}</p>}
                  <Meters b={niche.breakdown} />
                </div>
              </div>

              {ranking.length > 1 && (
                <div className="alts">
                  <div className="kicker">Crossings · tap to switch</div>
                  {ranking.map((r, i) => (
                    <button className={`alt${i === active ? ' is-active' : ''}`} key={i} onClick={() => pick(i)}>
                      <span className="txt">{r.skill} × {r.interest} × {r.opportunity}</span>
                      <span className="sc">{r.band} · {r.grade}{i === active ? ' ◂' : ''}</span>
                    </button>
                  ))}
                </div>
              )}

              <div className="kicker" style={{ marginTop: '1.75rem' }}>Three pitches</div>
              {loadingIdeas || !enriched ? (
                <div className="ideas-loading">Building three pitches…</div>
              ) : (
                <div className="ideas">
                  {[['service', 'Service'], ['physical', 'Physical product'], ['digital', 'Digital product']].map(([key, label]) => (
                    <Idea key={key} ideaKey={key} label={label} idea={enriched.ideas?.[key]} niche={niche} share={share} />
                  ))}
                </div>
              )}

              <div className="btn-row" style={{ marginTop: '2rem' }}>
                <Btn onClick={onBack}>← Back</Btn>
                <Btn onClick={onStartOver}>Start over</Btn>
              </div>
            </section>
          );
        }

        function Meters({ b }) {
          if (!b) return null;
          const rows = [['surprise', 'Surprise'], ['pull', 'Opportunity pull'], ['rarity', 'Rarity']];
          return (
            <div className="meters">
              {rows.map(([k, label]) => {
                const pct = Math.round((b[k] || 0) * 100);
                return <div className="meter" key={k}><span className="mk">{label}</span><div className="track"><div className="fill" style={{ width: pct + '%' }} /></div><span className="mv">{pct}</span></div>;
              })}
            </div>
          );
        }

        function Idea({ ideaKey, label, idea, niche, share }) {
          const fitStoreKey = `collider:fit:${nicheKey(niche)}:${ideaKey}`;
          const [fit, setFit] = useState(() => { try { return localStorage.getItem(fitStoreKey) || ''; } catch { return ''; } });
          if (!idea) return null;
          const setRating = val => {
            const next = fit === val ? '' : val; setFit(next);
            try { next ? localStorage.setItem(fitStoreKey, next) : localStorage.removeItem(fitStoreKey); } catch {}
            if (next) fetch(`${API_URL}/api/feedback`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ niche: nicheKey(niche), ideaType: ideaKey, ideaName: idea.name, rating: next, share }) }).catch(() => {});
          };
          const blocks = [['what', 'What it is & the problem it tackles'], ['why', 'Why it matters'], ['how', 'How to pitch it']];
          return (
            <div className={`idea${fit === 'yes' ? ' is-pick' : ''}`}>
              <div className="idea-head">
                <span className="t">{label}</span>
                {fit === 'yes' && <span className="pick-chip">Your pick</span>}
              </div>
              <div className="name">{idea.name}</div>
              {idea.target && <div className="for">For: {idea.target}</div>}
              {idea.pitch && <div className="pitch">“{idea.pitch}”</div>}
              <Money value={idea.money} />
              {blocks.map(([k, lab]) => idea[k] ? <div className="block" key={k}><div className="bt">{lab}</div><p>{idea[k]}</p></div> : null)}

              <div className="fit">
                <div className="bt">Does this fit what you want?</div>
                <div className="rates">
                  {[['yes', 'Yes'], ['maybe', 'Maybe'], ['no', 'No']].map(([val, lab]) => (
                    <button key={val} className={`rate${fit === val ? ' on' : ''}`} onClick={() => setRating(val)}>{lab}</button>
                  ))}
                </div>
              </div>

              <div className="idea-actions">
                <Btn onClick={() => downloadPitchPng({ niche, label, idea, fit })} style={{ width: '100%' }}>Download one-pager PNG ↓</Btn>
              </div>
            </div>
          );
        }

        // ---------- PNG one-pager (canvas, no deps) ----------
        async function downloadPitchPng({ niche, label, idea, fit }) {
          try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch {}
          const W = 1080, PAD = 76, CW = W - PAD * 2;
          const INK = '#0a0a0a', RED = '#e5342a', MUT = '#666';
          const canvas = document.createElement('canvas');
          canvas.width = W; canvas.height = 4400;
          const ctx = canvas.getContext('2d');
          ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W, canvas.height);
          ctx.textBaseline = 'alphabetic'; ctx.textAlign = 'left';
          let y = PAD;
          const wrap = (text, maxW) => {
            const words = String(text).split(/\s+/); const lines = []; let l = '';
            for (const w of words) { const t = l ? l + ' ' + w : w; if (ctx.measureText(t).width > maxW && l) { lines.push(l); l = w; } else l = t; }
            if (l) lines.push(l); return lines;
          };
          const draw = (text, { font, color, x = PAD, maxW = CW, lh }) => { ctx.font = font; ctx.fillStyle = color; for (const line of wrap(text, maxW)) { y += lh; ctx.fillText(line, x, y); } };

          // mast
          ctx.font = "700 54px 'Space Grotesk'"; ctx.fillStyle = INK; y += 54; ctx.fillText('COLLIDER', PAD, y);
          const wm = ctx.measureText('COLLIDER').width;
          ctx.fillStyle = RED; ctx.fillRect(PAD + wm + 14, y - 30, 28, 28);
          ctx.font = "700 22px 'JetBrains Mono'"; ctx.fillStyle = MUT; ctx.textAlign = 'right';
          ctx.fillText(label.toUpperCase(), W - PAD, y - 6); ctx.textAlign = 'left';
          y += 20; ctx.fillStyle = INK; ctx.fillRect(PAD, y, CW, 3);

          draw(`${niche.skill} × ${niche.interest} × ${niche.opportunity}   ·   ${niche.band} ${niche.grade}/100`, { font: "500 25px 'JetBrains Mono'", color: '#333', lh: 40 });
          y += 6;
          draw(idea.name, { font: "700 62px 'Space Grotesk'", color: INK, lh: 66 });
          if (idea.target) { y += 6; draw('For: ' + idea.target, { font: "400 23px 'JetBrains Mono'", color: MUT, lh: 32 }); }
          if (idea.pitch) {
            y += 22; ctx.font = "500 35px 'Space Grotesk'";
            const lines = wrap('“' + idea.pitch + '”', CW - 34); const lh = 48;
            ctx.fillStyle = RED; ctx.fillRect(PAD, y + 8, 6, lines.length * lh);
            ctx.fillStyle = INK; for (const line of lines) { y += lh; ctx.fillText(line, PAD + 34, y); }
          }
          // $ opportunity meter
          if (idea.money) {
            const n = Math.max(0, Math.min(5, idea.money));
            y += 34; draw('$ OPPORTUNITY', { font: "700 22px 'JetBrains Mono'", color: RED, lh: 28 });
            y += 50; ctx.font = "700 42px 'JetBrains Mono'"; let mx = PAD;
            for (let i = 1; i <= 5; i++) { ctx.fillStyle = i <= n ? RED : '#dcdcdc'; ctx.fillText('$', mx, y); mx += ctx.measureText('$').width + 8; }
            ctx.font = "500 30px 'Space Grotesk'"; ctx.fillStyle = INK; ctx.fillText('  ' + (MONEY_LABEL[n] || ''), mx + 12, y - 4);
          }

          const sec = (lab, body) => { if (!body) return; y += 34; draw(lab, { font: "700 22px 'JetBrains Mono'", color: RED, lh: 28 }); y += 4; draw(body, { font: "400 30px 'Space Grotesk'", color: INK, lh: 43 }); };
          sec('WHAT IT IS & THE PROBLEM IT TACKLES', idea.what);
          sec('WHY IT MATTERS', idea.why);
          sec('HOW TO PITCH IT & GET FEEDBACK', idea.how);

          const take = { yes: 'This fits what I want.', maybe: 'Could work. Worth exploring.', no: 'Not what I want.' }[fit];
          if (take) { y += 34; draw('MY TAKE', { font: "700 22px 'JetBrains Mono'", color: RED, lh: 28 }); y += 4; draw(take, { font: "500 30px 'Space Grotesk'", color: INK, lh: 43 }); }

          y += 48; ctx.fillStyle = '#bbb'; ctx.fillRect(PAD, y, CW, 1); y += 6;
          draw('Made with COLLIDER. Collide your skills, interests & opportunities into a niche worth building.', { font: "400 18px 'JetBrains Mono'", color: '#888', lh: 27 });
          y += PAD;

          const out = document.createElement('canvas'); out.width = W; out.height = Math.ceil(y);
          out.getContext('2d').drawImage(canvas, 0, 0);
          const slug = (idea.name || 'pitch').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 40);
          out.toBlob(blob => {
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `collider-${slug}.png`;
            document.body.appendChild(a); a.click(); a.remove(); setTimeout(() => URL.revokeObjectURL(a.href), 1500);
          }, 'image/png');
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<Collider />);
    </script>
</body>
</html>
